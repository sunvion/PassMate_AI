version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: pass-cert-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-pass_cert_db}
    ports:
      - '5432:5432'
    volumes:
      - pass_cert_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      # 🌟 [추가 1] 백업 파일(pass_cert_backup.sql)이 위치한 호스트의 현재 루트 디렉토리를 맵핑
      - ./:/backup
      # 🌟 [추가 2] 파일 존재 여부를 체크하여 자동 복원을 수행할 쉘 스크립트 맵핑
      - ./postgres/restore.sh:/docker-entrypoint-initdb.d/restore.sh
    networks:
      - pass-cert-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pass-cert-backend
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - ./docs:/app/docs
      - ./frontend/public:/app/frontend/public  # 🌟 [핵심 추가]: 프론트 정적 폴더를 백엔드 컨테이너와 공유합니다!
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-pass_cert_db}
    depends_on:
      - db
    networks:
      - pass-cert-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pass-cert-frontend
    restart: always
    ports:
      - '3000:3000'
    # [중요] 호환성 유지 및 덮어쓰기 방지를 위한 익명 볼륨 맵핑 지정
    volumes:
      - ./frontend:/app
      - /app/node_modules # 윈도우 노드 모듈이 컨테이너 내부를 꼬이게 하지 않도록 격리
      - /app/.next # 빌드 캐시 격리
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - pass-cert-network

volumes:
  pass_cert_postgres_data:

networks:
  pass-cert-network:
    driver: bridge
